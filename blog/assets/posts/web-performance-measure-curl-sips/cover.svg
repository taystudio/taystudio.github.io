<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','SF Mono',Consolas,monospace">
  <rect width="800" height="450" fill="#0d1117"/>
  <!-- terminal frame -->
  <rect x="40" y="40" width="720" height="370" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- traffic lights -->
  <circle cx="64" cy="64" r="6" fill="#ff5f56"/>
  <circle cx="84" cy="64" r="6" fill="#ffbd2e"/>
  <circle cx="104" cy="64" r="6" fill="#27c93f"/>
  <text x="400" y="68" font-size="11" fill="#8b949e" text-anchor="middle">curl + sips · web perf audit</text>
  <!-- prompt -->
  <text x="65" y="110" font-size="14" fill="#7ee787" font-weight="500">$ curl -w "%{time_starttransfer}s · %{size_download}B" -o /dev/null -s URL</text>
  <text x="65" y="138" font-size="14" fill="#c9d1d9">  TTFB:       0.337s</text>
  <text x="65" y="158" font-size="14" fill="#c9d1d9">  Total:      0.338s</text>
  <text x="65" y="178" font-size="14" fill="#c9d1d9">  Size:       21702 B   (HTML)</text>
  <!-- divider -->
  <line x1="65" y1="200" x2="735" y2="200" stroke="#30363d" stroke-width="1"/>
  <text x="65" y="225" font-size="14" fill="#79c0ff">$ python audit.py</text>
  <!-- bar chart -->
  <text x="65" y="255" font-size="13" fill="#c9d1d9">cover.jpg  1024×1024</text>
  <rect x="280" y="244" width="380" height="14" fill="#f85149" rx="2"/>
  <text x="670" y="255" font-size="13" fill="#f85149" font-weight="600">375 KB 🔴</text>
  <text x="65" y="280" font-size="13" fill="#c9d1d9">cover.jpg   800×800</text>
  <rect x="280" y="269" width="180" height="14" fill="#d29922" rx="2"/>
  <text x="670" y="280" font-size="13" fill="#d29922" font-weight="600">120 KB 🟡</text>
  <text x="65" y="305" font-size="13" fill="#c9d1d9">cover.webp  800×800</text>
  <rect x="280" y="294" width="65" height="14" fill="#3fb950" rx="2"/>
  <text x="670" y="305" font-size="13" fill="#3fb950" font-weight="600">42 KB ✓</text>
  <!-- summary -->
  <line x1="65" y1="320" x2="735" y2="320" stroke="#30363d" stroke-width="1"/>
  <text x="65" y="350" font-size="13" fill="#8b949e">page weight  2625 KB  →  </text>
  <text x="265" y="350" font-size="13" fill="#7ee787" font-weight="600">350 KB</text>
  <text x="320" y="350" font-size="13" fill="#8b949e">(7.5× lighter)</text>
  <text x="65" y="375" font-size="13" fill="#8b949e">LCP          8.2s  →  </text>
  <text x="232" y="375" font-size="13" fill="#7ee787" font-weight="600">2.1s</text>
  <text x="275" y="375" font-size="13" fill="#8b949e">(under good threshold)</text>
</svg>
