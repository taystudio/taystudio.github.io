<body>
  <site-header></site-header>
  <main class="container">
    <div class="breadcrumb"><a href="../index.html">도구</a> · 금융·세금 · 복리 계산기</div>
    <h1>복리 계산기</h1>
    <p class="subtitle">일시 투자 + 매월 적립 동시 계산. 미래 가치 한눈에.</p>

    <form id="form" class="card">
      <div class="field">
        <label for="principal">초기 원금 <span class="hint">만원 / 없으면 0</span></label>
        <input type="number" id="principal" placeholder="0" min="0" step="100" value="0">
      </div>
      <div class="field">
        <label for="monthly">매월 적립금 <span class="hint">만원</span></label>
        <input type="number" id="monthly" placeholder="예: 50" min="0" step="10" value="0">
      </div>
      <div class="row">
        <div class="field">
          <label for="rate">연 수익률 (%)</label>
          <input type="number" id="rate" placeholder="예: 7" min="0" step="0.1" required>
        </div>
        <div class="field">
          <label for="years">기간 (년)</label>
          <input type="number" id="years" placeholder="예: 20" min="1" step="1" required>
        </div>
      </div>
      <button type="submit">미래가치 계산</button>
    </form>

    <div class="ad-slot">[ AdSense — 재테크 카테고리 ]</div>

    <div id="result" class="result" style="display:none">
      <div class="result-headline">
        <div class="result-label">미래가치 (FV)</div>
        <div id="totalFV" class="result-value">0원</div>
        <div id="multiple" class="result-sub">-</div>
      </div>
      <div class="breakdown">
        <div class="breakdown-row"><span class="label">총 투자 원금</span><span id="invested" class="value">0원</span></div>
        <div class="breakdown-row"><span class="label">— 일시 투자분 미래가치</span><span id="principalPart" class="value">0원</span></div>
        <div class="breakdown-row"><span class="label">— 월 적립분 미래가치</span><span id="monthlyPart" class="value">0원</span></div>
        <div class="breakdown-row total"><span class="label">총 수익</span><span id="profit" class="value">0원</span></div>
      </div>
    </div>

    <div class="disclaimer">
      ⚠️ 세전·인플레이션 무시 단순 추정. 실제 투자는 세금(이자/배당 15.4%, 양도세 등)과 인플레이션이 적용됩니다. ETF·주식 투자 시 변동성 고려.
    </div>
